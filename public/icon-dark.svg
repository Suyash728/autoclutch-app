<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dark Metallic Gradient Background -->
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2832" />
      <stop offset="40%" stop-color="#1f1e26" />
      <stop offset="100%" stop-color="#111015" />
    </linearGradient>

    <!-- Outer Border Highlight -->
    <linearGradient id="borderHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Glass Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Shield Border Gradient -->
    <linearGradient id="shieldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d94ff" />
      <stop offset="50%" stop-color="#5B4FE3" />
      <stop offset="100%" stop-color="#3c2f9e" />
    </linearGradient>

    <!-- Shield Fill Gradient -->
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#221e3b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#141124" stop-opacity="0.9" />
    </linearGradient>

    <!-- Symbol Inner Fill Gradient -->
    <linearGradient id="symbolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4c0ff" />
      <stop offset="50%" stop-color="#8075ff" />
      <stop offset="100%" stop-color="#4e3ec4" />
    </linearGradient>
  </defs>

  <!-- Base Squircle Background -->
  <rect width="512" height="512" rx="128" fill="url(#darkBg)" />
  
  <!-- Subtle Inner Glass Bevel -->
  <rect x="2" y="2" width="508" height="508" rx="126" fill="none" stroke="url(#borderHighlight)" stroke-width="4" />

  <!-- The Shield Structure -->
  <g transform="translate(0, 0)">
    <!-- Outer Shield Glow -->
    <path d="M256,128 C305,128 355,145 355,145 C355,145 375,245 340,315 C305,385 256,410 256,410 C256,410 207,385 172,315 C137,245 157,145 157,145 C157,145 207,128 256,128 Z" 
          fill="url(#shieldFill)" 
          stroke="url(#shieldBorder)" 
          stroke-width="12" 
          stroke-linejoin="round" 
          filter="url(#neonGlow)" />
  </g>

  <!-- Autonomous Speed Clutch Symbol ("7" Lightning Bolt Hybrid) -->
  <g transform="translate(0, 0)" filter="url(#neonGlow)">
    <!-- Main dynamic chevron symbol -->
    <path d="M 215,225 
             L 305,225 
             L 305,255 
             L 245,345 
             L 215,345 
             L 265,270 
             L 195,270 
             L 215,240 
             Z" 
          fill="url(#symbolGrad)" />
          
    <!-- Dynamic bottom accent slash representing split second clutch action -->
    <path d="M 205,315 L 245,255 L 255,270 L 215,330 Z" fill="#ffb4a6" opacity="0.9" />
  </g>

  <!-- Ambient light shine overlay across the top left to give the squircle a 3D glass volume -->
  <path d="M 0,128 A 128,128 0 0,1 128,0 L 384,0 A 128,128 0 0,1 512,128 C 384,100 128,100 0,128 Z" fill="#ffffff" opacity="0.04" />
</svg>
