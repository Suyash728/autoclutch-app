<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoClutch</title>
    
    <!-- PWA Meta and Links -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#5B4FE3" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AutoClutch" />
    <link rel="apple-touch-icon" href="/icon-light.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('AutoClutch Service Worker registered successfully:', registration.scope);
            })
            .catch((error) => {
              console.error('AutoClutch Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
